<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <style>
            * { margin: 0; padding: 0; }
            .leaflet-container img { max-height: none !important; }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <script>
            var map = L.map('map', {
                center: [27.486, -109.939],
                zoom: 13
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            var marker = L.marker([27.486, -109.939]).addTo(map);

            function mover(lat, lng) {
                let current = marker.getLatLng();
                let steps = 20, i = 0;
                let deltaLat = (lat - current.lat) / steps;
                let deltaLng = (lng - current.lng) / steps;
                let interval = setInterval(() => {
                    if (i >= steps) { clearInterval(interval); return; }
                    current.lat += deltaLat;
                    current.lng += deltaLng;
                    marker.setLatLng([current.lat, current.lng]);
                    map.setView([current.lat, current.lng]);
                    i++;
                }, 100);
            }
        </script>
    </body>
</html>
