<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Mapa</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
            }
            html, body {
                width: 100%;
                height: 100%;
                overflow: hidden;
            }
            #map {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <script>
            document.getElementById('map').style.width = '600px';
            document.getElementById('map').style.height = '450px';

            var map = L.map('map', {
                center: [27.486, -109.939],
                zoom: 13,
                zoomControl: true
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            var marker = L.marker([27.486, -109.939]).addTo(map);

            setTimeout(() => {
                document.getElementById('map').style.width = '100%';
                document.getElementById('map').style.height = '100%';
                map.invalidateSize(true);
                map.setView([27.486, -109.939], 13); // fuerza zoom y posición
            }, 1000);

            function mover(lat, lng) {
                let current = marker.getLatLng();
                let steps = 20;
                let i = 0;
                let deltaLat = (lat - current.lat) / steps;
                let deltaLng = (lng - current.lng) / steps;
                let interval = setInterval(() => {
                    if (i >= steps) {
                        clearInterval(interval);
                        return;
                    }
                    current.lat += deltaLat;
                    current.lng += deltaLng;
                    marker.setLatLng([current.lat, current.lng]);
                    map.setView([current.lat, current.lng]);
                    i++;
                }, 100);
            }
        </script>
    </body>
</html>
